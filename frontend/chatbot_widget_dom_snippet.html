<!-- Chat widget DOM (inserted into index.html) -->
<button id="chatbot-fab" type="button" aria-label="Open chatbot">
  💬
</button>

<section id="chat-section" class="hidden">
  <div id="chat-card" role="dialog" aria-modal="true" aria-label="Chatbot">
    <header id="chat-header">
      <h2>Barcodeify Assistant</h2>
      <button id="chatbot-close" type="button" aria-label="Close chatbot">✕</button>
    </header>

    <div id="chat-body">
      <div id="chat-messages"></div>
    </div>

    <div id="chat-controls">
      <input id="chat-input" type="text" placeholder="Ask about health, ingredients, nutrition..." autocomplete="off" />
      <button id="chat-send" type="button">Send</button>
    </div>
  </div>
</section>
